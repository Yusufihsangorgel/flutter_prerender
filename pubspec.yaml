name: flutter_prerender
description: >-
  Command-line tool that prerenders a Flutter web app to static, crawlable HTML
  for SEO. Loads each route in headless Chrome and emits headings, links, meta,
  and a sitemap.
version: 0.3.0
repository: https://github.com/Yusufihsangorgel/flutter_prerender
issue_tracker: https://github.com/Yusufihsangorgel/flutter_prerender/issues
topics:
  - seo
  - web
  - prerender
  - ssg
  - flutter

screenshots:
  - description: >-
      Prerender each Flutter web route to static HTML with headless Chrome, then
       serve it to crawlers by User-Agent or as one hydrating page.
    path: doc/architecture.png

environment:
  sdk: ^3.9.0

executables:
  flutter_prerender:

dependencies:
  args: ^2.5.0
  html: ^0.15.4
  path: ^1.9.0
  puppeteer: ^3.25.0
  yaml: ^3.1.2

dev_dependencies:
  lints: ^5.1.0
  test: ^1.25.0
