<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#E2E8F0" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="400" fill="#0B1220"/>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- type lockup, lower left -->
  <rect x="66" y="200" width="44" height="6" fill="#38BDF8"/>
  <text x="64" y="292" font-family="Menlo, monospace" font-size="60" font-weight="bold" fill="#E2E8F0">flutter_prerender</text>
  <text x="66" y="338" font-family="Menlo, monospace" font-size="24" fill="#94A3B8">Static, crawlable HTML from a Flutter web app</text>

  <!-- motif: opaque canvas frame on the left -> arrow -> structured HTML tags on the right -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="3">
    <!-- canvas: a filled frame with a diagonal, meaning pixels/no text -->
    <rect x="812" y="120" width="150" height="150" rx="6" stroke="#1E3A5F"/>
    <path d="M 828 254 L 900 186 L 946 232" stroke="#1E3A5F"/>
    <circle cx="852" cy="156" r="10" stroke="#1E3A5F"/>

    <!-- transform arrow -->
    <path d="M 984 195 L 1024 195" stroke="#38BDF8"/>
    <path d="M 1014 187 L 1026 195 L 1014 203" stroke="#38BDF8"/>

    <!-- structured document: heading bar + text lines + a link line -->
    <rect x="1048" y="132" width="86" height="12" rx="2" stroke="#38BDF8"/>
    <path d="M 1048 168 L 1134 168" stroke="#1E3A5F"/>
    <path d="M 1048 190 L 1120 190" stroke="#1E3A5F"/>
    <path d="M 1048 212 L 1134 212" stroke="#1E3A5F"/>
    <!-- link line, accented and underlined -->
    <path d="M 1048 246 L 1104 246" stroke="#38BDF8"/>
    <path d="M 1048 256 L 1104 256" stroke="#38BDF8" stroke-width="1.5"/>
  </g>
</svg>
