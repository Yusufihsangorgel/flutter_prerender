include: package:lints/recommended.yaml

analyzer:
  # The example is a Flutter app with its own pubspec and analysis options, so
  # the package's pure-Dart analyzer cannot resolve Flutter's symbols there and
  # reports every widget as undefined. Anyone who cloned this and ran
  # `dart analyze` saw dozens of errors in a package that is in fact clean.
  # Analyse the example on its own terms instead: `cd example && flutter analyze`.
  exclude:
    - example/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    - public_member_api_docs
    - prefer_final_locals
    - directives_ordering
    - avoid_print
    - unawaited_futures
    - prefer_relative_imports
